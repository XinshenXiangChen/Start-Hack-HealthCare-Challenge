<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Healthcare Standardization Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f7f2;
      --surface: #ffffff;
      --ink: #12212a;
      --ink-soft: #5f6f78;
      --ok: #0f8a5f;
      --err: #c23d3d;
      --run: #ac7a00;
      --line: #dbe2e8;
      --accent: #007a8f;
      --accent-soft: #d5f5ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 520px at 100% 0%, #d8f4ff 0%, transparent 50%),
        radial-gradient(900px 450px at -10% -10%, #ffeecb 0%, transparent 44%),
        var(--bg);
    }
    .wrap { max-width: 1200px; margin: 28px auto 60px; padding: 0 18px; }
    .hero {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
      margin-bottom: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(18, 33, 42, 0.06);
    }
    .title { margin: 0; font-size: 30px; line-height: 1.1; letter-spacing: -0.02em; }
    .subtitle { margin: 8px 0 0; color: var(--ink-soft); font-size: 15px; }
    .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 14px; }
    .kpi { background: #f9fbfd; border: 1px solid var(--line); border-radius: 12px; padding: 11px; }
    .kpi .v { font-size: 24px; font-weight: 700; margin: 0; }
    .kpi .l { font-size: 12px; color: var(--ink-soft); margin: 2px 0 0; text-transform: uppercase; letter-spacing: .04em; }
    form { display: grid; gap: 10px; }
    input[type="file"] { width: 100%; border: 1px dashed var(--line); border-radius: 10px; padding: 10px; background: #fafcfe; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button.reset {
      background: #c23d3d;
    }
    .meta { color: var(--ink-soft); font-size: 13px; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; vertical-align: top; }
    th { background: #f3f7fa; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #48606d; }
    .chip { display: inline-block; border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 700; }
    .chip.ok { background: #dff6ee; color: var(--ok); }
    .chip.error { background: #fde3e3; color: var(--err); }
    .chip.running { background: #fff2cf; color: var(--run); }
    .chip.queued { background: #e9eef3; color: #466178; }
    .small { color: var(--ink-soft); font-size: 12px; }
    a.dl { color: var(--accent); text-decoration: none; font-weight: 700; }
    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(8), td:nth-child(8) { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <section class="panel">
        <h1 class="title">Live Standardization Dashboard</h1>
        <p class="subtitle">Incoming files are detected, standardized through your LLM pipeline, then exported as target-schema CSV.</p>
        <div class="kpis">
          <div class="kpi"><p class="v" id="k-total">0</p><p class="l">Total Jobs</p></div>
          <div class="kpi"><p class="v" id="k-queued">0</p><p class="l">Queued</p></div>
          <div class="kpi"><p class="v" id="k-running">0</p><p class="l">Running</p></div>
          <div class="kpi"><p class="v" id="k-ok">0</p><p class="l">Succeeded</p></div>
          <div class="kpi"><p class="v" id="k-err">0</p><p class="l">Failed</p></div>
        </div>
      </section>
      <section class="panel">
        <form id="upload-form">
          <label for="file">Push one file directly</label>
          <input id="file" name="file" type="file" required />
          <button type="submit">Upload To Intake Queue</button>
        </form>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
          <button id="reset-btn" class="reset" type="button">Reset Dashboard</button>
          <label style="font-size:12px;color:#5f6f78;">
            <input id="purge-files" type="checkbox" />
            also delete runtime files
          </label>
        </div>
        <p id="upload-status" class="meta"></p>
        <div class="meta" id="cfg"></div>
      </section>
    </div>
    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>Input</th>
            <th>Table</th>
            <th>Rows</th>
            <th>Mapped</th>
            <th>Semantic</th>
            <th>Output</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="jobs"></tbody>
      </table>
    </section>
  </div>

  <script>
    const jobsEl = document.getElementById("jobs");
    const cfgEl = document.getElementById("cfg");
    const uploadStatus = document.getElementById("upload-status");

    const kTotal = document.getElementById("k-total");
    const kQueued = document.getElementById("k-queued");
    const kRun = document.getElementById("k-running");
    const kOk = document.getElementById("k-ok");
    const kErr = document.getElementById("k-err");

    function esc(s) {
      return String(s ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function chip(status) {
      const c = status === "ok" ? "ok" : status === "error" ? "error" : status === "queued" ? "queued" : "running";
      return `<span class="chip ${c}">${esc(status)}</span>`;
    }

    async function refresh() {
      const [sumRes, jobsRes] = await Promise.all([
        fetch("/api/summary"),
        fetch("/api/jobs?limit=300")
      ]);
      const summary = await sumRes.json();
      const data = await jobsRes.json();
      kTotal.textContent = summary.total_jobs;
      kQueued.textContent = summary.queued_jobs;
      kRun.textContent = summary.running_jobs;
      kOk.textContent = summary.ok_jobs;
      kErr.textContent = summary.error_jobs;
      cfgEl.innerHTML =
        `Input: <b>${esc(summary.input_dir)}</b><br>` +
        `Output: <b>${esc(summary.output_dir)}</b><br>` +
        `Model: <b>${esc(summary.model)}</b> | LLM: <b>${summary.llm_enabled ? "on" : "off"}</b> | Workers: <b>${summary.worker_concurrency}</b> | Queue depth: <b>${summary.queue_size}</b> | Scan every <b>${summary.scan_seconds}s</b>`;

      jobsEl.innerHTML = (data.jobs || []).map(j => {
        const rows = (j.rows_in ?? "-") + "/" + (j.rows_out ?? "-");
        const sem = j.semantic_extraction_used ? `yes (${j.semantic_rows_enriched})` : "no";
        const out = j.output_file ? `<a class="dl" href="/api/download/${j.id}">download</a>` : "-";
        return `<tr>
          <td>${chip(j.status)}</td>
          <td>${esc(j.input_file)}<div class="small">${esc(j.created_at)}</div></td>
          <td>${esc(j.table || "-")}</td>
          <td>${esc(rows)}</td>
          <td>${esc(j.mapped_columns ?? "-")}</td>
          <td>${esc(sem)}</td>
          <td>${out}</td>
          <td class="small">${esc(j.error || "")}</td>
        </tr>`;
      }).join("");
    }

    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const file = document.getElementById("file").files[0];
      if (!file) return;
      uploadStatus.textContent = "Uploading...";
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch("/api/upload", { method: "POST", body: fd });
      const data = await res.json();
      uploadStatus.textContent = res.ok
        ? `Uploaded: ${data.saved_to} (queued: ${data.queued ? "yes" : "already seen"}) ${data.job_id ? "| job: " + data.job_id : ""}`
        : `Upload failed: ${data.detail || "unknown error"}`;
      document.getElementById("file").value = "";
      await refresh();
    });

    document.getElementById("reset-btn").addEventListener("click", async () => {
      const purge = document.getElementById("purge-files").checked;
      const ok = confirm(`Reset dashboard state${purge ? " and delete runtime files" : ""}?`);
      if (!ok) return;
      uploadStatus.textContent = "Resetting...";
      const res = await fetch(`/api/reset?purge_files=${purge ? "true" : "false"}`, { method: "POST" });
      const data = await res.json();
      uploadStatus.textContent = res.ok
        ? `Reset done: jobs=${data.cleared_jobs}, queue=${data.cleared_queue_items}, deleted_files=${data.deleted_files}`
        : `Reset failed: ${data.detail || "unknown error"}`;
      await refresh();
    });

    refresh();
    setInterval(refresh, 1200);
  </script>
</body>
</html>
